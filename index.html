<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Técnico de Inovação de TI | Banco de Moçambique</title>
<style>
  /* ===== MOBILE-FIRST: base styles target ~375px viewport ===== */
  :root {
    --primary: #1F4E79;
    --primary-dark: #163E60;
    --gold: #C8A951;
    --gold-light: #E5C66E;
    --success: #2E7D32;
    --error: #C62828;
    --bg: #F4F6F9;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text-muted: #6B7280;
    --border: #E5E7EB;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--card);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    width: 100%;
    background: var(--card);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    padding: 16px 18px;
    position: relative;
    flex-shrink: 0;
  }
  .header h1 { font-size: 16px; font-weight: 700; line-height: 1.3; }
  .header .subtitle { font-size: 12px; opacity: 0.85; margin-top: 3px; }
  .header .gold-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
  }

  .progress-bar {
    height: 5px;
    background: var(--border);
    width: 100%;
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    width: 0%;
    transition: width 0.4s ease;
  }

  .content {
    padding: 20px 18px 28px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* ===== Start screen ===== */
  .start-screen { text-align: center; padding: 12px 0; display: flex; flex-direction: column; }
  .start-screen h2 { font-size: 22px; color: var(--primary); margin-bottom: 10px; }
  .start-screen p { color: var(--text-muted); margin-bottom: 18px; font-size: 14px; }
  .start-info {
    background: #F0F4F8;
    border-left: 4px solid var(--primary);
    padding: 14px 16px;
    border-radius: 8px;
    text-align: left;
    margin: 16px 0;
  }
  .start-info ul { list-style: none; }
  .start-info li {
    padding: 6px 0;
    font-size: 14px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .start-info li:before {
    content: "▸";
    color: var(--gold);
    font-weight: bold;
    flex-shrink: 0;
  }

  /* ===== Status bar ===== */
  .status {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    font-size: 13px;
    color: var(--text-muted);
    gap: 8px;
    flex-wrap: wrap;
  }
  .difficulty-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    white-space: nowrap;
  }
  .diff-1 { background: #E0F2E9; color: #2E7D32; }
  .diff-2 { background: #FFF4E0; color: #B58000; }
  .diff-3 { background: #FCE4E4; color: #C62828; }

  /* ===== Question ===== */
  .topic-tag {
    display: inline-block;
    background: var(--primary);
    color: white;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .question-type {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--text);
    line-height: 1.45;
  }

  /* ===== Options (touch-friendly: min-height 56px) ===== */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: white;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    min-height: 56px;
    cursor: pointer;
    font-size: 15px;
    transition: background 0.15s ease, border-color 0.15s ease;
    text-align: left;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text);
    font-family: inherit;
    line-height: 1.4;
  }
  .option:active:not(:disabled) {
    background: #F0F4F8;
    border-color: var(--primary);
  }
  .option:disabled { cursor: not-allowed; opacity: 0.9; }
  .option .letter {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    background: var(--border);
    color: var(--text);
    border-radius: 50%;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }
  .option.correct { border-color: var(--success); background: #E8F5E9; }
  .option.correct .letter { background: var(--success); color: white; }
  .option.wrong { border-color: var(--error); background: #FFEBEE; }
  .option.wrong .letter { background: var(--error); color: white; }

  /* ===== Fill input (font-size 16px prevents iOS zoom) ===== */
  .fill-input {
    width: 100%;
    padding: 14px 16px;
    min-height: 54px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
    font-family: inherit;
    color: var(--text);
    background: white;
    transition: border-color 0.15s ease;
    -webkit-appearance: none;
    appearance: none;
  }
  .fill-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(31, 78, 121, 0.1);
  }
  .fill-input:disabled { background: #F8FAFC; }
  .fill-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    font-style: italic;
  }

  /* ===== Buttons (touch-friendly: min-height 48px) ===== */
  .btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 12px 24px;
    min-height: 48px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
    font-family: inherit;
    width: 100%;
  }
  .btn:active:not(:disabled) { background: var(--primary-dark); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-big { min-height: 54px; font-size: 16px; }
  .actions { margin-top: 20px; display: flex; justify-content: stretch; gap: 10px; }

  /* ===== Feedback ===== */
  .feedback {
    margin-top: 18px;
    padding: 16px 16px;
    border-radius: 12px;
    animation: slideIn 0.3s ease;
  }
  .feedback.correct { background: #E8F5E9; border-left: 4px solid var(--success); }
  .feedback.wrong { background: #FFEBEE; border-left: 4px solid var(--error); }
  .feedback-title {
    font-weight: 700;
    margin-bottom: 8px;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .feedback.correct .feedback-title { color: var(--success); }
  .feedback.wrong .feedback-title { color: var(--error); }
  .feedback-answer { font-size: 14px; margin-bottom: 8px; line-height: 1.5; }
  .feedback-answer strong { color: var(--primary); }
  .feedback-explanation { font-size: 14px; color: #444; line-height: 1.55; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== End screen ===== */
  .end-screen { text-align: center; padding: 12px 0; }
  .score-circle {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    margin: 18px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: white;
    font-weight: 700;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }
  .score-circle .pct { font-size: 34px; line-height: 1; }
  .score-circle .label { font-size: 11px; opacity: 0.9; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .end-screen h2 { font-size: 22px; color: var(--primary); margin: 10px 0; }
  .end-screen .summary { color: var(--text-muted); margin: 12px 0 18px; font-size: 14px; }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin: 20px 0;
  }
  .stat-card {
    background: #F8FAFC;
    border-radius: 10px;
    padding: 12px 6px;
  }
  .stat-card .value { font-size: 20px; font-weight: 700; color: var(--primary); }
  .stat-card .label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .recommendation {
    background: linear-gradient(135deg, #F0F4F8 0%, #E8ECF1 100%);
    border-radius: 12px;
    padding: 16px 18px;
    text-align: left;
    margin: 18px 0;
    border-left: 4px solid var(--gold);
  }
  .recommendation strong { color: var(--primary); display: block; margin-bottom: 6px; }
  .recommendation p { font-size: 14px; color: #444; line-height: 1.6; }

  /* ===== TABLET AND UP (>= 600px) ===== */
  @media (min-width: 600px) {
    body {
      background: linear-gradient(135deg, var(--bg) 0%, #E8ECF1 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
    }
    .container {
      max-width: 720px;
      min-height: 0;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .header { padding: 22px 28px; }
    .header h1 { font-size: 19px; }
    .header .subtitle { font-size: 13px; }
    .content { padding: 28px 28px 32px; min-height: 420px; }
    .question-text { font-size: 18px; margin-bottom: 24px; }
    .option {
      padding: 14px 18px;
      font-size: 15px;
    }
    .option:hover:not(:disabled) {
      border-color: var(--primary);
      background: #F8FAFC;
      transform: translateY(-1px);
    }
    .btn {
      width: auto;
      padding: 14px 28px;
    }
    .btn:hover:not(:disabled) {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(31, 78, 121, 0.25);
    }
    .actions { justify-content: flex-end; }
    .start-screen h2 { font-size: 26px; }
    .start-screen p { font-size: 15px; }
    .score-circle { width: 160px; height: 160px; }
    .score-circle .pct { font-size: 42px; }
    .score-circle .label { font-size: 12px; }
    .end-screen h2 { font-size: 24px; }
    .stats-grid { gap: 12px; }
    .stat-card { padding: 16px 12px; }
    .stat-card .value { font-size: 22px; }
    .stat-card .label { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Quiz — Técnico de Inovação de TI</h1>
    <div class="subtitle">Preparação para o Concurso Público do Banco de Moçambique</div>
    <div class="gold-bar"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="content" id="content"></div>
</div>

<script>
// ============ QUESTION BANK ============
// difficulty: 1 = Fundamentos, 2 = Intermédio, 3 = Avançado
const QUESTIONS = [
  // ============================================
  // DIFFICULTY 1 — FUNDAMENTOS (~30 perguntas)
  // ============================================
  { type: "mc", difficulty: 1, topic: "ISO 56002",
    question: "A norma ISO 56002 estabelece directrizes para:",
    options: ["Sistemas de Gestão da Qualidade", "Sistemas de Gestão da Segurança da Informação", "Sistemas de Gestão da Inovação", "Sistemas de Gestão Ambiental"],
    correctIndex: 2,
    explanation: "ISO 56002 trata especificamente de Sistemas de Gestão da Inovação. Para referência: ISO 9001 = qualidade, ISO 27001 = segurança da informação, ISO 14001 = ambiente." },

  { type: "fill", difficulty: 1, topic: "CBDC",
    question: "O acrónimo CBDC significa Central Bank Digital _____.",
    correctAnswers: ["currency"],
    explanation: "CBDC = Central Bank Digital Currency (Moeda Digital de Banco Central). É a versão digital da moeda fiduciária emitida directamente pelo banco central." },

  { type: "mc", difficulty: 1, topic: "Cloud",
    question: "No modelo de Cloud Computing, o serviço que dá ao cliente maior controlo sobre a infraestrutura é:",
    options: ["SaaS", "PaaS", "IaaS", "FaaS"],
    correctIndex: 2,
    explanation: "IaaS (Infrastructure as a Service) entrega infraestrutura virtualizada. O cliente gere SO, runtime e aplicação. SaaS é o mais gerido pelo fornecedor; PaaS está entre os dois." },

  { type: "tf", difficulty: 1, topic: "Machine Learning",
    question: "Deep Learning é um subconjunto de Machine Learning.",
    correctAnswer: true,
    explanation: "Verdadeiro. Deep Learning é um subconjunto de ML baseado em redes neuronais profundas. Hierarquia: IA ⊃ Machine Learning ⊃ Deep Learning." },

  { type: "mc", difficulty: 1, topic: "Scrum",
    question: "No Scrum, o papel responsável por maximizar o valor do produto é o:",
    options: ["Scrum Master", "Product Owner", "Development Team", "Stakeholder"],
    correctIndex: 1,
    explanation: "O Product Owner gere o backlog do produto e prioridades, decidindo o que entra em cada sprint para maximizar valor. O Scrum Master serve a equipa; a Dev Team executa." },

  { type: "fill", difficulty: 1, topic: "Kotter",
    question: "O primeiro passo do modelo de Kotter (8 passos) é criar um sentido de _____.",
    correctAnswers: ["urgencia", "urgência"],
    explanation: "Criar um sentido de urgência (sense of urgency) é o passo 1 de Kotter. Sem urgência percebida, a mudança não arranca." },

  { type: "mc", difficulty: 1, topic: "CBDC",
    question: "CBDC significa:",
    options: ["Central Bank Digital Currency", "Centralized Banking Data Channel", "Crypto-Backed Digital Coin", "Continuous Banking Data Control"],
    correctIndex: 0,
    explanation: "Central Bank Digital Currency é a forma digital da moeda fiduciária emitida directamente pelo banco central." },

  { type: "tf", difficulty: 1, topic: "Blockchain",
    question: "Blockchain é uma tecnologia exclusiva para criptomoedas.",
    correctAnswer: false,
    explanation: "Falso. Blockchain tem muitas aplicações além de criptomoedas: smart contracts, rastreabilidade de cadeia de abastecimento, identidade digital, registos de propriedade, CBDCs, etc." },

  { type: "mc", difficulty: 1, topic: "Machine Learning",
    question: "Aprendizagem supervisionada distingue-se de não-supervisionada porque:",
    options: ["Usa redes neuronais em vez de árvores de decisão", "Trabalha com dados rotulados (com resposta conhecida)", "É executada na cloud", "Requer intervenção humana em tempo real"],
    correctIndex: 1,
    explanation: "Aprendizagem supervisionada usa dados rotulados (com a resposta certa). A não-supervisionada procura padrões em dados não rotulados (ex.: clustering)." },

  { type: "fill", difficulty: 1, topic: "Lewin",
    question: "Os três estágios do modelo de Lewin são: Unfreeze, _____ e Refreeze.",
    correctAnswers: ["change", "mudar", "mudanca", "mudança"],
    explanation: "Os 3 estágios: Unfreeze (descongelar — quebrar resistências), Change (mudar — implementar) e Refreeze (recongelar — consolidar)." },

  { type: "mc", difficulty: 1, topic: "Open Banking",
    question: "Open Banking caracteriza-se principalmente por:",
    options: ["Tornar todos os dados bancários públicos", "Permitir, com consentimento do cliente, a partilha de dados financeiros entre instituições via APIs", "Eliminar a regulamentação do sector bancário", "Substituir a banca tradicional por criptomoedas"],
    correctIndex: 1,
    explanation: "Open Banking permite, mediante consentimento explícito do cliente, a partilha segura de dados financeiros entre instituições através de APIs padronizadas." },

  { type: "tf", difficulty: 1, topic: "ADKAR",
    question: "ADKAR é um modelo de gestão de mudança focado nas dimensões individuais da transição.",
    correctAnswer: true,
    explanation: "Verdadeiro. ADKAR (Awareness, Desire, Knowledge, Ability, Reinforcement) foca-se na mudança ao nível individual — cada pessoa atravessa estas 5 fases." },

  { type: "mc", difficulty: 1, topic: "Transformação Digital",
    question: "Um dos quatro pilares da transformação digital geralmente aceites é:",
    options: ["Lucro", "Cultura organizacional", "Marketing", "Recursos naturais"],
    correctIndex: 1,
    explanation: "Os quatro pilares típicos são: pessoas, processos, tecnologia e cultura organizacional. Sem cultura, a tecnologia por si só não transforma." },

  { type: "fill", difficulty: 1, topic: "Scrum",
    question: "Os três papéis (responsabilidades) do Scrum são: Product Owner, Developers (Dev Team) e _____ Master.",
    correctAnswers: ["scrum"],
    explanation: "Os três papéis: Product Owner (valor do produto), Scrum Master (facilita o processo) e Developers/Dev Team (constroem o incremento)." },

  { type: "mc", difficulty: 1, topic: "PMBOK",
    question: "Segundo o PMBOK, os grupos de processos da gestão de projectos são:",
    options: ["Planeamento, Desenvolvimento, Testes, Entrega", "Iniciação, Planeamento, Execução, Monitorização e Controlo, Encerramento", "Análise, Desenho, Implementação, Operação", "Visão, Missão, Estratégia, Táctica, Operação"],
    correctIndex: 1,
    explanation: "Os 5 grupos de processos do PMBOK: Iniciação, Planeamento, Execução, Monitorização & Controlo, e Encerramento." },

  { type: "tf", difficulty: 1, topic: "ISO 56002",
    question: "A norma ISO 56002 é certificável, à semelhança da ISO 9001.",
    correctAnswer: false,
    explanation: "Falso. A ISO 56002 fornece directrizes (guidance) e não é certificável. A norma certificável da família é a ISO 56001." },

  { type: "mc", difficulty: 1, topic: "Blockchain",
    question: "No contexto blockchain, \"mecanismo de consenso\" refere-se a:",
    options: ["O acordo entre developers sobre o código", "O processo pelo qual os nós da rede concordam sobre o estado válido do registo", "A votação dos utilizadores sobre alterações", "A aprovação regulamentar da rede"],
    correctIndex: 1,
    explanation: "O mecanismo de consenso é o protocolo (ex.: PoW, PoS) pelo qual os nós da rede concordam sobre qual é a versão válida do registo, sem necessidade de uma autoridade central." },

  { type: "fill", difficulty: 1, topic: "ADKAR",
    question: "No modelo ADKAR, a letra A inicial significa _____.",
    correctAnswers: ["awareness", "consciencia", "consciência"],
    explanation: "A = Awareness (Consciência) — consciência da necessidade da mudança. As 5 letras: Awareness, Desire, Knowledge, Ability, Reinforcement." },

  { type: "mc", difficulty: 1, topic: "IA",
    question: "A classificação correcta dos tipos de IA é:",
    options: ["IA Estreita (Narrow), IA Geral (General) e Super-IA", "IA Estática, IA Dinâmica e IA Híbrida", "IA Local, IA Cloud e IA Edge", "IA Aberta, IA Fechada e IA Mista"],
    correctIndex: 0,
    explanation: "Narrow AI (tarefas específicas — todos os modelos actuais), General AI (cognição equivalente ao humano — ainda hipotética) e Super AI (acima do humano — hipotética)." },

  { type: "tf", difficulty: 1, topic: "Cloud",
    question: "Cloud híbrida combina recursos de cloud pública e privada, permitindo maior flexibilidade.",
    correctAnswer: true,
    explanation: "Verdadeiro. Cloud híbrida orquestra cargas entre clouds pública e privada, equilibrando custo, controlo e flexibilidade." },

  { type: "mc", difficulty: 1, topic: "Smart Contracts",
    question: "Uma característica fundamental de um smart contract é:",
    options: ["Necessita de aprovação humana para cada execução", "Executa-se automaticamente quando as condições pré-definidas são cumpridas", "Pode ser alterado livremente após implantação", "Funciona apenas em redes centralizadas"],
    correctIndex: 1,
    explanation: "Smart contracts são programas autoexecutáveis numa blockchain que disparam acções automaticamente quando condições pré-definidas são satisfeitas, sem intermediários." },

  { type: "fill", difficulty: 1, topic: "ISO 56002",
    question: "A norma ISO _____ define directrizes para Sistemas de Gestão da Inovação.",
    correctAnswers: ["56002"],
    explanation: "ISO 56002:2019 fornece directrizes para Sistemas de Gestão da Inovação. A norma certificável é a ISO 56001." },

  { type: "mc", difficulty: 1, topic: "Cloud",
    question: "Qual destes NÃO é um modelo de implantação (deployment) de cloud computing?",
    options: ["Cloud Pública", "Cloud Privada", "Cloud Híbrida", "Cloud Vertical"],
    correctIndex: 3,
    explanation: "Os 4 modelos de implantação são: Pública, Privada, Híbrida e Comunitária. \"Vertical\" não existe como modelo de deployment de cloud." },

  { type: "tf", difficulty: 1, topic: "Cloud",
    question: "No modelo SaaS, a responsabilidade pela manutenção e actualização da aplicação é totalmente do cliente.",
    correctAnswer: false,
    explanation: "Falso. No SaaS, a manutenção e actualização são responsabilidade do fornecedor; o cliente apenas consome o serviço." },

  { type: "mc", difficulty: 1, topic: "Scrum",
    question: "A principal responsabilidade do Scrum Master é:",
    options: ["Gerir o backlog do produto", "Liderar tecnicamente a equipa", "Servir a equipa removendo impedimentos e promovendo o Scrum", "Aprovar os entregáveis perante stakeholders"],
    correctIndex: 2,
    explanation: "O Scrum Master é um servant-leader. Não tem autoridade hierárquica — facilita o processo, remove impedimentos e protege a equipa." },

  { type: "fill", difficulty: 1, topic: "Cloud",
    question: "O acrónimo IaaS significa _____ as a Service.",
    correctAnswers: ["infrastructure", "infraestrutura"],
    explanation: "IaaS = Infrastructure as a Service. Fornece infraestrutura virtualizada (servidores, storage, rede) sob demanda." },

  { type: "mc", difficulty: 1, topic: "Manifesto Ágil",
    question: "Um dos quatro valores do Manifesto Ágil é:",
    options: ["Processos e ferramentas acima de indivíduos e interacções", "Documentação extensa acima de software funcional", "Indivíduos e interacções acima de processos e ferramentas", "Contratos rígidos acima de colaboração"],
    correctIndex: 2,
    explanation: "Os 4 valores: (1) Indivíduos e interacções > processos e ferramentas; (2) Software funcional > documentação extensa; (3) Colaboração com o cliente > negociação de contratos; (4) Resposta à mudança > seguir um plano." },

  { type: "tf", difficulty: 1, topic: "Scrum",
    question: "O Daily Scrum deve ter uma duração máxima de 15 minutos.",

const progress = document.getElementById('progress');

function normalize(str) {
  return String(str).toLowerCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^\w\s]/g, '');
}

function startGame() {
  // Sort by difficulty, shuffle within each difficulty
  const easy = QUESTIONS.filter(q => q.difficulty === 1);
  const med  = QUESTIONS.filter(q => q.difficulty === 2);
  const hard = QUESTIONS.filter(q => q.difficulty === 3);
  const shuffle = arr => arr.sort(() => Math.random() - 0.5);
  state.questions = [...shuffle(easy), ...shuffle(med), ...shuffle(hard)];
  state.currentIndex = 0;
  state.correct = 0;
  state.wrong = 0;
  state.byDifficulty = { 1: { correct: 0, total: 0 }, 2: { correct: 0, total: 0 }, 3: { correct: 0, total: 0 } };
  renderQuestion();
}

function renderStart() {
  content.innerHTML = `
    <div class="start-screen">
      <h2>Pronto para começar?</h2>
      <p>Testa o teu conhecimento para o concurso público do Banco de Moçambique.</p>
      <div class="start-info">
        <ul>
          <li><strong>${QUESTIONS.length} perguntas</strong> em 3 níveis de dificuldade</li>
          <li>Mistura de <strong>escolha múltipla, verdadeiro/falso e preencher o espaço</strong></li>
          <li>Começas no nível <strong>Fundamentos</strong> e progrides até <strong>Avançado</strong></li>
          <li>Quando erras, a resposta correcta é mostrada com explicação</li>
          <li>No final, recebes uma avaliação detalhada</li>
        </ul>
      </div>
      <button class="btn btn-big" onclick="startGame()">Iniciar Quiz</button>
    </div>
  `;
  progress.style.width = '0%';
}

function renderQuestion() {
  if (state.currentIndex >= state.questions.length) {
    renderEnd();
    return;
  }
  const q = state.questions[state.currentIndex];
  state.answered = false;
  const diffLabel = ['', 'Fundamentos', 'Intermédio', 'Avançado'][q.difficulty];
  const typeLabel = { mc: 'Escolha Múltipla', tf: 'Verdadeiro ou Falso', fill: 'Preencha o Espaço' }[q.type];

  let optionsHTML = '';
  if (q.type === 'mc') {
    const letters = ['A', 'B', 'C', 'D', 'E'];
    optionsHTML = `<div class="options">${q.options.map((opt, i) =>
      `<button class="option" data-index="${i}" onclick="answerMC(${i})">
        <span class="letter">${letters[i]}</span>
        <span>${opt}</span>
      </button>`
    ).join('')}</div>`;
  } else if (q.type === 'tf') {
    optionsHTML = `<div class="options">
      <button class="option" data-tf="true" onclick="answerTF(true)">
        <span class="letter">V</span><span>Verdadeiro</span>
      </button>
      <button class="option" data-tf="false" onclick="answerTF(false)">
        <span class="letter">F</span><span>Falso</span>
      </button>
    </div>`;
  } else if (q.type === 'fill') {
    optionsHTML = `
      <input type="text" class="fill-input" id="fillInput" placeholder="Escreva a sua resposta..." autocomplete="off"
             onkeydown="if(event.key==='Enter') answerFill()">
      <div class="fill-hint">Não te preocupes com acentos ou maiúsculas — são ignorados.</div>
      <div class="actions">
        <button class="btn" onclick="answerFill()">Submeter resposta</button>
      </div>
    `;
  }

  content.innerHTML = `
    <div class="status">
      <span>Pergunta <strong>${state.currentIndex + 1}</strong> de ${state.questions.length}</span>
      <span class="difficulty-badge diff-${q.difficulty}">${diffLabel}</span>
    </div>
    <div class="topic-tag">${q.topic}</div>
    <div class="question-type">${typeLabel}</div>
    <div class="question-text">${q.question}</div>
    ${optionsHTML}
    <div id="feedback-area"></div>
  `;

  progress.style.width = ((state.currentIndex) / state.questions.length * 100) + '%';

  if (q.type === 'fill') {
    setTimeout(() => document.getElementById('fillInput').focus(), 50);
  }
}

function answerMC(idx) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.currentIndex];
  const correct = idx === q.correctIndex;
  document.querySelectorAll('.option').forEach((el, i) => {
    el.disabled = true;
    if (i === q.correctIndex) el.classList.add('correct');
    if (i === idx && !correct) el.classList.add('wrong');
  });
  showFeedback(correct, q.options[q.correctIndex], q.explanation);
}

function answerTF(value) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.currentIndex];
  const correct = value === q.correctAnswer;
  document.querySelectorAll('.option').forEach(el => {
    el.disabled = true;
    const tf = el.dataset.tf === 'true';
    if (tf === q.correctAnswer) el.classList.add('correct');
    if (tf === value && !correct) el.classList.add('wrong');
  });
  showFeedback(correct, q.correctAnswer ? 'Verdadeiro' : 'Falso', q.explanation);
}

function answerFill() {
  if (state.answered) return;
  const input = document.getElementById('fillInput');
  const userAnswer = normalize(input.value);
  if (!userAnswer) return;
  state.answered = true;
  const q = state.questions[state.currentIndex];
  const correct = q.correctAnswers.some(a => normalize(a) === userAnswer);
  input.disabled = true;
  if (correct) {
    input.style.borderColor = 'var(--success)';
    input.style.background = '#E8F5E9';
  } else {
    input.style.borderColor = 'var(--error)';
    input.style.background = '#FFEBEE';
  }
  // Disable submit button
  document.querySelectorAll('.actions .btn').forEach(b => b.disabled = true);
  showFeedback(correct, q.correctAnswers[0], q.explanation);
}

function showFeedback(correct, correctAnswer, explanation) {
  const q = state.questions[state.currentIndex];
  state.byDifficulty[q.difficulty].total++;
  if (correct) {
    state.correct++;
    state.byDifficulty[q.difficulty].correct++;
  } else {
    state.wrong++;
  }
  const fb = document.getElementById('feedback-area');
  if (correct) {
    fb.innerHTML = `
      <div class="feedback correct">
        <div class="feedback-title">✓ Correcto!</div>
        <div class="feedback-answer">Resposta: <strong>${correctAnswer}</strong></div>
        <div class="feedback-explanation">${explanation}</div>
        <div class="actions" style="margin-top:14px;">
          <button class="btn" onclick="nextQuestion()">Próxima pergunta →</button>
        </div>
      </div>
    `;
  } else {
    fb.innerHTML = `
      <div class="feedback wrong">
        <div class="feedback-title">✗ Resposta incorrecta</div>
        <div class="feedback-answer">Resposta correcta: <strong>${correctAnswer}</strong></div>
        <div class="feedback-explanation">${explanation}</div>
        <div class="actions" style="margin-top:14px;">
          <button class="btn" onclick="nextQuestion()">Continuar →</button>
        </div>
      </div>
    `;
  }
}

function nextQuestion() {
  state.currentIndex++;
  renderQuestion();
}

function renderEnd() {
  const total = state.questions.length;
  const pct = Math.round((state.correct / total) * 100);
  const valores = Math.round((state.correct / total) * 20 * 10) / 10;

  let color, title, recommendation;
  if (pct >= 80) {
    color = 'linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%)';
    title = 'Excelente preparação!';
    recommendation = "Estás muito bem preparado. Foca-te em refinar os tópicos onde ainda erraste e em treinar as respostas de desenvolvimento (Grupo IV). Continua a fazer simulações.";
  } else if (pct >= 65) {
    color = 'linear-gradient(135deg, #1F4E79 0%, #163E60 100%)';
    title = 'Boa preparação — está no caminho!';
    recommendation = "Estás na zona de candidatos apurados (≥10 valores na prova real). Identifica os tópicos com mais erros, revê as fichas dessas áreas e refaz o quiz dentro de alguns dias.";
  } else if (pct >= 50) {
    color = 'linear-gradient(135deg, #ED6C02 0%, #C25B00 100%)';
    title = 'Preparação razoável — precisa de reforço';
    recommendation = "Passas o corte mínimo (10/20), mas é arriscado. Concentra-te em estudar as áreas onde mais erraste — em especial as perguntas de dificuldade Fundamentos e Intermédio que falharam. Volta a testar daqui a uma semana.";
  } else {
    color = 'linear-gradient(135deg, #C62828 0%, #8B0000 100%)';
    title = 'É preciso mais preparação';
    recommendation = "Ainda há trabalho a fazer. Volta às fichas dos temas principais (ISO 56002, gestão de mudança, ágil, tecnologias emergentes), refaz o quiz dentro de 1-2 semanas. Não desistas — com método consegues melhorar muito.";
  }

  const dPct = (d) => state.byDifficulty[d].total > 0
    ? Math.round(state.byDifficulty[d].correct / state.byDifficulty[d].total * 100)
    : 0;

  content.innerHTML = `
    <div class="end-screen">
      <h2>${title}</h2>
      <div class="score-circle" style="background: ${color};">
        <div class="pct">${pct}%</div>
        <div class="label">${state.correct} / ${total}</div>
      </div>
      <div class="summary">Equivalente a aproximadamente <strong>${valores} valores</strong> numa prova de 20.</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="value">${dPct(1)}%</div>
          <div class="label">Fundamentos</div>
        </div>
        <div class="stat-card">
          <div class="value">${dPct(2)}%</div>
          <div class="label">Intermédio</div>
        </div>
        <div class="stat-card">
          <div class="value">${dPct(3)}%</div>
          <div class="label">Avançado</div>
        </div>
      </div>
      <div class="recommendation">
        <strong>Recomendação</strong>
        <p>${recommendation}</p>
      </div>
      <button class="btn btn-big" onclick="startGame()">Jogar de novo</button>
    </div>
  `;
  progress.style.width = '100%';
}

// Initialize
renderStart();
</script>
</body>
</html>
